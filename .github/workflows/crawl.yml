name: Sales Tower Crawler

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests supabase
      - name: 크롤러 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPA_URL }}
          SUPABASE_KEY: ${{ secrets.SUPA_KEY }}
          BRIGHT: ${{ secrets.BRIGHT }}
        run: python crawler.py
