name: Sales Tower Crawler

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '59 14 * * *'
  workflow_dispatch:
    inputs:
      product_id:
        description: '특정 상품만 수집할 경우 ID 입력 (비우면 전체 수집)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests supabase
      - name: 크롤러 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPA_URL }}
          SUPABASE_KEY: ${{ secrets.SUPA_KEY }}
          BRIGHT: ${{ secrets.BRIGHT }}
          PRODUCT_ID: ${{ github.event.inputs.product_id }}
        run: python crawler.py
