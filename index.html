<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sales Tower | 스마트스토어 실시간 관제탑</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main: #0047AB; --bg: #F0F4F8; --dark: #001A33; --gold: #F59E0B; --green: #22C55E; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; color: #1E293B; }

        .sidebar { width: 260px; background: var(--dark); color: white; height: 100vh; padding: 32px 16px; position: fixed; overflow-y: auto; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; margin-bottom: 24px; color: #fff; cursor: pointer; }
        .product-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-size: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.2s; }
        .product-item:hover { background: rgba(255,255,255,0.08); }
        .product-item.active { background: var(--main); border-color: rgba(255,255,255,0.3); font-weight: 700; }
        .sidebar-footer { margin-top: 24px; font-size: 10px; color: #334155; text-align: center; line-height: 1.8; }

        .main { margin-left: 260px; padding: 48px; width: calc(100% - 260px); }
        .card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,26,51,0.06); margin-bottom: 24px; border: 1px solid #E2E8F0; }
        .briefing-card { background: linear-gradient(135deg, #001A33, #0047AB); color: white; padding: 40px; border-radius: 24px; margin-bottom: 28px; }
        .tag { background: var(--gold); color: #000; padding: 4px 14px; border-radius: 50px; font-weight: 800; font-size: 11px; margin-bottom: 16px; display: inline-block; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; color: #94A3B8; font-size: 11px; border-bottom: 2px solid #F1F5F9; font-weight: 600; }
        td { padding: 16px; border-bottom: 1px solid #F8FAFC; font-size: 14px; vertical-align: middle; }
        tr:hover td { background: #F8FAFC; }
        .sales-badge { background: #E0F2FE; color: #0369A1; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; }
        .today-badge { background: #DCFCE7; color: #15803D; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; }
        .yesterday-badge { background: #FEF3C7; color: #B45309; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; }

        .detail-header { padding: 32px 36px; border-bottom: 1px solid #F1F5F9; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
        .detail-body { display: flex; padding: 36px; gap: 20px; flex-wrap: wrap; }
        .detail-metric { flex: 1; min-width: 150px; color: white; padding: 28px 20px; border-radius: 20px; text-align: center; }
        .detail-metric.today { background: #15803D; }
        .detail-metric.total { background: var(--main); }
        .detail-metric .label { opacity: 0.8; font-size: 13px; margin-bottom: 10px; }
        .detail-metric .value { font-size: 52px; font-weight: 900; line-height: 1; }
        .detail-metric .sub { font-size: 11px; opacity: 0.6; margin-top: 10px; }
        .detail-chart { flex: 3; min-width: 280px; background: white; padding: 24px; border-radius: 20px; border: 1px solid #E2E8F0; }

        .chart-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .chart-tab { padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #E2E8F0; background: white; color: #94A3B8; transition: 0.2s; }
        .chart-tab.active { background: var(--main); color: white; border-color: var(--main); }

        .empty { text-align: center; padding: 48px; color: #94A3B8; font-size: 14px; line-height: 2; }
        .loading { text-align: center; padding: 48px; color: #94A3B8; font-size: 14px; }
        .back-btn { background: none; border: none; color: var(--main); cursor: pointer; font-weight: 700; font-size: 14px; margin-bottom: 20px; padding: 0; }
        .rank-1 { color: #F59E0B; font-weight:900; } .rank-2 { color: #94A3B8; font-weight:900; } .rank-3 { color: #CD7C2F; font-weight:900; }
        .link-btn { background: var(--main); color: white; padding: 7px 16px; border-radius: 50px; font-size: 11px; font-weight: 700; text-decoration: none; white-space: nowrap; }
        .link-btn:hover { opacity: 0.85; }
        .last-update { font-size: 12px; color: #94A3B8; margin-top: 8px; }

        /* 액션 버튼들 */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .crawl-btn { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .crawl-btn:hover { opacity: 0.85; }
        .crawl-btn:disabled { background: #94A3B8; cursor: not-allowed; }
        .excel-btn { background: #15803D; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .excel-btn:hover { opacity: 0.85; }

        /* 상품 관리 모달 */
        .modal-bg { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; }
        .modal-bg.show { display:flex; }
        .modal-box { background:white; border-radius:20px; padding:36px; width:480px; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .modal-box h3 { margin:0 0 20px; font-size:18px; }
        .modal-input { width:100%; padding:12px 16px; border:1px solid #E2E8F0; border-radius:10px; font-size:14px; outline:none; margin-bottom:10px; }
        .modal-input:focus { border-color:var(--main); }
        .modal-btn { padding:12px 24px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:none; }
        .modal-btn.primary { background:var(--main); color:white; }
        .modal-btn.cancel { background:#F1F5F9; color:#64748B; margin-left:8px; }
        .product-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #F1F5F9; font-size:13px; }
        .product-row .pname { flex:1; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .product-row .purl { flex:2; color:#94A3B8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:11px; }
        .del-btn { background:none; border:1px solid #E2E8F0; border-radius:6px; padding:3px 8px; cursor:pointer; font-size:11px; color:#94A3B8; }
        .option-toggle { background:none; border:1px solid #E2E8F0; border-radius:6px; padding:3px 8px; cursor:pointer; font-size:11px; color:#94A3B8; margin-right:4px; }
        .option-toggle.on { background:#FEF3C7; border-color:#F59E0B; color:#B45309; font-weight:700; }
        .del-btn:hover { border-color:#EF4444; color:#EF4444; }
        .manage-btn { background:none; border:1px solid rgba(255,255,255,0.15); color:#94A3B8; width:100%; padding:10px; border-radius:8px; cursor:pointer; font-size:11px; margin-top:12px; }
        .manage-btn:hover { color:white; border-color:rgba(255,255,255,0.4); }
    </style>
</head>
<body onload="initMaster()">

<!-- 상품 관리 모달 -->
<div class="modal-bg" id="manageModal">
    <div class="modal-box">
        <h3>📦 추적 상품 관리</h3>
        <div style="margin-bottom:20px;">
            <input class="modal-input" id="addName" placeholder="상품명 (URL 입력하면 자동완성)" />
            <div style="position:relative;">
                <input class="modal-input" id="addUrl" placeholder="네이버 상품 URL 입력 (https://...)" oninput="onUrlInput(this.value)" style="padding-right:80px;" />
                <span id="fetchStatus" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:#94A3B8;"></span>
            </div>
            <div style="display:flex;gap:8px;">
                <button class="modal-btn primary" onclick="addProduct()">+ 추가</button>
                <button class="modal-btn cancel" onclick="closeModal()">닫기</button>
            </div>
        </div>
        <div id="productManageList"></div>
    </div>
</div>

<div class="sidebar">
    <div class="logo" onclick="showSummary()">SALES TOWER</div>
    <div id="productList"></div>
    <div class="sidebar-footer" id="lastUpdateInfo">-</div>
    <button class="manage-btn" onclick="openModal()">⚙️ 상품 관리</button>
    <button class="manage-btn" onclick="resetToken()" style="margin-top:6px;">🔑 토큰 재설정</button>
</div>

<div class="main">
    <div id="summaryView">
        <div class="briefing-card">
            <div class="tag">📡 Sales Tower v2.0</div>
            <h1 style="margin:0 0 10px;font-size:30px;">경쟁사 판매 관제탑</h1>
            <p style="opacity:0.7;font-size:15px;margin:0;">매일 00시 / 23시59분 자동 수집 · Supabase 연동</p>
        </div>

        <div class="action-bar">
            <button class="crawl-btn" id="crawlNowBtn" onclick="crawlNow()">⚡ 지금 수집</button>
            <button class="excel-btn" onclick="downloadExcel()">📥 엑셀 다운로드</button>
            <span id="crawlStatus" style="font-size:12px;color:#94A3B8;"></span>
        </div>

        <div class="card">
            <h3 style="margin:0 0 20px;font-size:16px;">📊 경쟁사 판매 순위 <span style="font-size:12px;color:#94A3B8;font-weight:400;" id="todayDate"></span></h3>
            <table>
                <thead>
                    <tr>
                        <th>순위</th><th>상품명</th><th>전일 판매량</th><th>오늘 판매량</th><th>누적 판매량</th><th>마지막 수집</th><th></th>
                    </tr>
                </thead>
                <tbody id="rankingTable"><tr><td colspan="6"><div class="loading">⏳ 데이터 불러오는 중...</div></td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="detailView" style="display:none;">
        <button class="back-btn" onclick="showSummary()">← 전체 순위로</button>
        <div class="card" style="padding:0;overflow:hidden;border-radius:24px;">
            <div class="detail-header">
                <h2 id="detailName" style="margin:0;font-size:20px;word-break:keep-all;flex:1;"></h2>
                <a id="detailLink" href="#" target="_blank" class="link-btn" style="display:none;">🔗 상품 페이지</a>
            </div>
            <div class="detail-body">
                <div class="detail-metric today">
                    <div class="label">📅 오늘 판매량</div>
                    <div class="value" id="detailTodaySales">+0</div>
                    <div class="sub" id="detailTodayRange">00:00 ~ 현재</div>
                </div>
                <div class="detail-metric total">
                    <div class="label">📈 누적 판매량</div>
                    <div class="value" id="detailTotalSales">+0</div>
                    <div class="sub" id="detailSync">-</div>
                </div>
                <div class="detail-chart">
                    <div class="chart-tabs">
                        <button class="chart-tab active" id="tabToday" onclick="switchTab('today')">오늘</button>
                        <button class="chart-tab" id="tabAll" onclick="switchTab('all')">전체</button>
                    </div>
                    <canvas id="detailChart" height="110"></canvas>
                </div>
            </div>
        </div>

        <!-- 일자별 판매량 테이블 -->
        <div class="card" style="margin-top:0;">
            <h3 style="margin:0 0 20px;font-size:16px;">📅 일자별 판매량</h3>
            <table>
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>판매량</th>
                        <th>수집 횟수</th>
                    </tr>
                </thead>
                <tbody id="dailyTable">
                    <tr><td colspan="3"><div class="loading">⏳ 불러오는 중...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ★ 여기에 Supabase 정보 입력
    var SUPABASE_URL = 'https://tdgdlcudvkhxhmwlnhda.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2RsY3VkdmtoeGhtd2xuaGRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDg0NDgsImV4cCI6MjA4OTQ4NDQ0OH0.gLSr_PFQj02gZNvFWkBThBYAJFl6pUjcJP9eJzfAkek';

    // GitHub 토큰 - 코드에 넣지 않고 브라우저에 저장
    var GITHUB_TOKEN = localStorage.getItem('st_github_token') || '';
    var GITHUB_REPO  = 'theub2000/sales-tower';

    var currentProduct = null;
    var currentLogs = [];
    var currentTab = 'today';
    var mainChart = null;
    var allProducts = [];
    var summaryRows = []; // 엑셀 다운로드용

    /* ── 초기화 ── */
    async function initMaster() {
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('ko-KR');
        if (!GITHUB_TOKEN) promptToken();
        await loadSummary();
    }

    function promptToken() {
        const t = prompt('GitHub 토큰을 입력해주세요 (ghp_로 시작):\n(한 번만 입력하면 이 브라우저에 저장됩니다)');
        if (t && t.trim()) {
            GITHUB_TOKEN = t.trim();
            localStorage.setItem('st_github_token', GITHUB_TOKEN);
        }
    }

    function resetToken() {
        localStorage.removeItem('st_github_token');
        GITHUB_TOKEN = '';
        promptToken();
    }

    /* ── GitHub Actions 트리거 ── */
    async function triggerCrawl(productId = null) {
        if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN_HERE') {
            console.warn('GitHub 토큰이 설정되지 않았습니다.');
            return false;
        }
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/crawl.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { product_id: productId ? String(productId) : '' } })
            });
            return res.status === 204;
        } catch(e) {
            console.error('크롤링 트리거 실패:', e);
            return false;
        }
    }

    /* ── 지금 수집 버튼 ── */
    async function crawlNow() {
        const btn = document.getElementById('crawlNowBtn');
        const status = document.getElementById('crawlStatus');
        btn.disabled = true;
        btn.innerText = '⏳ 수집 요청 중...';
        status.innerText = '';

        const ok = await triggerCrawl();
        if (ok) {
            status.innerText = '✅ 수집 시작됨! 1~2분 후 새로고침하면 반영돼요.';
            status.style.color = '#15803D';
        } else {
            status.innerText = '❌ 수집 요청 실패. GitHub 토큰을 확인해주세요.';
            status.style.color = '#EF4444';
        }

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = '⚡ 지금 수집';
        }, 10000);
    }

    /* ── 엑셀 다운로드 ── */
    async function downloadExcel() {
        if (!summaryRows.length) { alert('데이터가 없습니다. 잠시 후 다시 시도해주세요.'); return; }

        const wb = XLSX.utils.book_new();

        // 모든 상품 로그 미리 수집 (재사용)
        const allLogs = {};
        for (const r of summaryRows) {
            allLogs[r.id] = await sbGet(`stock_logs?product_id=eq.${r.id}&order=collected_at.asc&select=stock,collected_at`);
        }

        // 시트1: 판매 순위 요약 (전일/오늘/누적/최초수집일/마지막수집)
        const summaryData = [['순위', '상품명', '최초 수집일', '전일 판매량', '오늘 판매량', '누적 판매량', '마지막 수집']];
        summaryRows.forEach((r, i) => {
            const logs = allLogs[r.id];
            const firstLog = logs && logs[0] ? new Date(logs[0].collected_at).toLocaleString('ko-KR') : '-';
            const lastTime = r.lastLog ? new Date(r.lastLog.collected_at).toLocaleString('ko-KR') : '-';
            summaryData.push([
                i + 1,
                r.name,
                firstLog,
                r.yesterdaySales ?? 0,
                r.todaySales,
                r.totalSales,
                lastTime
            ]);
        });
        const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
        ws1['!cols'] = [{wch:6},{wch:40},{wch:22},{wch:12},{wch:12},{wch:12},{wch:22}];
        XLSX.utils.book_append_sheet(wb, ws1, '판매 순위');

        // 시트2: 일자별 판매량 피벗 (날짜 × 상품)
        const dateMap = {};
        const productNames = summaryRows.map(r => r.name);
        for (const r of summaryRows) {
            const logs = allLogs[r.id];
            for (let i = 1; i < logs.length; i++) {
                const diff = logs[i-1].stock - logs[i].stock;
                if (diff > 0) {
                    const d = new Date(logs[i].collected_at);
                    // KST 날짜로 변환
                    const kst = new Date(d.getTime() + 9*60*60*1000);
                    const date = kst.toISOString().slice(0,10);
                    if (!dateMap[date]) dateMap[date] = {};
                    dateMap[date][r.name] = (dateMap[date][r.name] || 0) + diff;
                }
            }
        }
        const dates = Object.keys(dateMap).sort((a,b) => b.localeCompare(a)); // 최신순
        const pivotData = [['날짜', ...productNames]];
        dates.forEach(d => {
            pivotData.push([d, ...productNames.map(n => dateMap[d][n] || 0)]);
        });
        const ws2 = XLSX.utils.aoa_to_sheet(pivotData);
        ws2['!cols'] = [{wch:14}, ...productNames.map(() => ({wch:14}))];
        XLSX.utils.book_append_sheet(wb, ws2, '일자별 판매량');

        // 시트3: 원본 로그
        const logData = [['상품명', '수집일시(KST)', '재고수량']];
        for (const r of summaryRows) {
            allLogs[r.id].forEach(l => {
                logData.push([r.name, new Date(l.collected_at).toLocaleString('ko-KR'), l.stock]);
            });
        }
        const ws3 = XLSX.utils.aoa_to_sheet(logData);
        ws3['!cols'] = [{wch:40},{wch:22},{wch:12}];
        XLSX.utils.book_append_sheet(wb, ws3, '원본 로그');

        const today = new Date().toISOString().slice(0,10);
        XLSX.writeFile(wb, `SalesTower_${today}.xlsx`);
    }

    /* ── API 헬퍼 ── */
    async function sbGet(path) {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function sbPost(path, body) {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function sbPatch(path, body) {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function sbDelete(path) {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        if (!res.ok) throw new Error(await res.text());
    }

    /* ── 날짜 헬퍼 ── */
    // KST 기준 날짜 경계 (UTC로 변환해서 반환)
    function getKSTDayStart(daysAgo = 0) {
        const now = new Date();
        // KST = UTC+9, 오늘 KST 00:00 = UTC 전날 15:00
        const kstMidnight = new Date(now);
        kstMidnight.setUTCHours(15, 0, 0, 0); // UTC 15시 = KST 00시
        if (now.getUTCHours() < 15) {
            // 아직 KST 00시 안 됐으면 하루 전
            kstMidnight.setUTCDate(kstMidnight.getUTCDate() - 1);
        }
        kstMidnight.setUTCDate(kstMidnight.getUTCDate() - daysAgo);
        return kstMidnight.toISOString();
    }

    function getTodayStartUTC()     { return getKSTDayStart(0); }
    function getYesterdayStartUTC() { return getKSTDayStart(1); }

    /* ── 판매량 계산 ── */
    function calcSalesFromLogs(logs) {
        let total = 0;
        for (let i = 1; i < logs.length; i++) {
            const diff = logs[i-1].stock - logs[i].stock;
            if (diff > 0) total += diff;
        }
        return total;
    }

    // 유료 옵션 있는 상품은 0.75 보정 (옵션 동반 구매율 약 25% 차감)
    function adjustSales(raw, hasPaidOptions) {
        if (!hasPaidOptions) return raw;
        return Math.round(raw * 0.75);
    }

    // 일자별 판매량 배열 반환 (보정 전 raw값)
    function calcDailySalesMap(logs) {
        const map = {};
        for (let i = 1; i < logs.length; i++) {
            const diff = logs[i-1].stock - logs[i].stock;
            if (diff > 0) {
                // KST 기준 날짜 (UTC+9)
                const d = new Date(new Date(logs[i].collected_at).getTime() + 9*60*60*1000);
                const date = d.toISOString().slice(0, 10);
                map[date] = (map[date] || 0) + diff;
            }
        }
        return map;
    }

    /* ── 요약 로드 ── */
    async function loadSummary() {
        try {
            allProducts = await sbGet('products?active=eq.true&select=id,name,url,has_paid_options&order=name.asc');
            refreshSidebar();

            const tbody = document.getElementById('rankingTable');
            if (!allProducts.length) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty">추적 중인 상품이 없습니다.<br>좌측 하단 "상품 관리"에서 추가해주세요.</div></td></tr>';
                return;
            }

            const rows = await Promise.all(allProducts.map(async (p) => {
                const logs = await sbGet(`stock_logs?product_id=eq.${p.id}&order=collected_at.asc&select=stock,collected_at`);
                const todayLogs = logs.filter(l => l.collected_at >= getTodayStartUTC());
                const beforeToday = logs.filter(l => l.collected_at < getTodayStartUTC());
                const todayCombined = [...beforeToday.slice(-1), ...todayLogs];
                const rawToday = calcSalesFromLogs(todayCombined);
                const rawTotal = calcSalesFromLogs(logs);
                const lastLog = logs[logs.length - 1];

                // 전일 판매량 계산 (KST 기준)
                const beforeYesterday  = logs.filter(l => l.collected_at < getYesterdayStartUTC());
                const yesterdayLogs    = logs.filter(l => l.collected_at >= getYesterdayStartUTC() && l.collected_at < getTodayStartUTC());
                const yesterdayCombined = [...beforeYesterday.slice(-1), ...yesterdayLogs];
                const rawYesterday = calcSalesFromLogs(yesterdayCombined);

                // 유료 옵션 있는 상품 0.75 보정
                const todaySales     = adjustSales(rawToday, p.has_paid_options);
                const yesterdaySales = adjustSales(rawYesterday, p.has_paid_options);

                // 누적 = 각 날짜별 보정값의 합
                const dailyMap = calcDailySalesMap(logs);
                const totalSales = Object.values(dailyMap).reduce((s, v) => s + adjustSales(v, p.has_paid_options), 0);

                return { ...p, logs, todaySales, totalSales, yesterdaySales, lastLog };
            }));

            rows.sort((a, b) => b.todaySales - a.todaySales);
            summaryRows = rows; // 엑셀용 저장

            const lastUpdates = rows.filter(r => r.lastLog).map(r => r.lastLog.collected_at);
            if (lastUpdates.length) {
                const latest = new Date(Math.max(...lastUpdates.map(t => new Date(t))));
                document.getElementById('lastUpdateInfo').innerText = '마지막 수집\n' + latest.toLocaleString('ko-KR');
            }

            tbody.innerHTML = rows.map((item, i) => {
                const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                const lastTime = item.lastLog ? new Date(item.lastLog.collected_at).toLocaleString('ko-KR') : '-';
                return `<tr onclick="showDetail(${item.id})" style="cursor:pointer">
                    <td class="${rc}">#${i+1}</td>
                    <td style="font-weight:600;max-width:260px;word-break:keep-all;">
                        ${escH(item.name)}
                        ${item.url ? `<a href="${escH(item.url)}" target="_blank" onclick="event.stopPropagation()" style="margin-left:6px;font-size:11px;color:var(--main);text-decoration:none;">🔗</a>` : ''}
                    </td>
                    <td><span class="yesterday-badge">+${item.yesterdaySales}</span></td>
                    <td><span class="today-badge">+${item.todaySales}</span></td>
                    <td><span class="sales-badge">+${item.totalSales}</span></td>
                    <td style="color:#94A3B8;font-size:12px;">${lastTime}</td>
                    <td></td>
                </tr>`;
            }).join('');

        } catch(e) {
            console.error(e);
            document.getElementById('rankingTable').innerHTML =
                '<tr><td colspan="6"><div class="empty">❌ 데이터 로딩 실패<br>' + e.message + '</div></td></tr>';
        }
    }

    /* ── 상세 뷰 ── */
    async function showDetail(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        currentProduct = product;
        currentTab = 'today';
        document.getElementById('summaryView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        refreshSidebar();

        document.getElementById('detailName').innerText = product.name;
        const linkEl = document.getElementById('detailLink');
        if (product.url) { linkEl.href = product.url; linkEl.style.display = 'inline-block'; }
        else { linkEl.style.display = 'none'; }

        const logs = await sbGet(`stock_logs?product_id=eq.${productId}&order=collected_at.asc&select=stock,collected_at`);
        currentLogs = logs;

        const beforeToday = logs.filter(l => l.collected_at < getTodayStartUTC());
        const todayLogs   = logs.filter(l => l.collected_at >= getTodayStartUTC());
        const todayCombined = [...beforeToday.slice(-1), ...todayLogs];

        const todaySales = adjustSales(calcSalesFromLogs(todayCombined), currentProduct.has_paid_options);
        const dailyMapDetail = calcDailySalesMap(logs);
        const totalSales = Object.values(dailyMapDetail).reduce((s, v) => s + adjustSales(v, currentProduct.has_paid_options), 0);

        document.getElementById('detailTodaySales').innerText = '+' + todaySales;
        document.getElementById('detailTotalSales').innerText = '+' + totalSales;

        const today = new Date();
        document.getElementById('detailTodayRange').innerText =
            (today.getMonth()+1) + '/' + today.getDate() + ' 00:00 ~ 현재';

        const lastLog = logs[logs.length-1];
        document.getElementById('detailSync').innerText =
            lastLog ? '마지막 수집: ' + new Date(lastLog.collected_at).toLocaleString('ko-KR') : '-';

        // 일자별 판매량 계산
        renderDailyTable(logs);

        document.getElementById('tabToday').className = 'chart-tab active';
        document.getElementById('tabAll').className   = 'chart-tab';
        renderChart(logs, 'today');
    }

    /* ── 일자별 판매량 테이블 ── */
    function renderDailyTable(logs) {
        const tbody = document.getElementById('dailyTable');
        if (!logs || logs.length < 2) {
            tbody.innerHTML = '<tr><td colspan="3"><div class="empty">데이터가 부족합니다.</div></td></tr>';
            return;
        }

        // 날짜별로 그룹핑
        const dateMap = {};
        for (let i = 1; i < logs.length; i++) {
            const diff = logs[i-1].stock - logs[i].stock;
            const date = new Date(logs[i].collected_at).toLocaleDateString('ko-KR');
            if (!dateMap[date]) dateMap[date] = { sales: 0, count: 0 };
            if (diff > 0) dateMap[date].sales += diff;
            dateMap[date].count++;
        }

        // 첫 번째 날짜도 count에 포함
        const firstDate = new Date(logs[0].collected_at).toLocaleDateString('ko-KR');
        if (!dateMap[firstDate]) dateMap[firstDate] = { sales: 0, count: 0 };
        dateMap[firstDate].count++;

        const dates = Object.keys(dateMap).sort((a, b) => new Date(b) - new Date(a));

        if (!dates.length) {
            tbody.innerHTML = '<tr><td colspan="3"><div class="empty">데이터가 없습니다.</div></td></tr>';
            return;
        }

        tbody.innerHTML = dates.map(date => {
            const { sales, count } = dateMap[date];
            const today = new Date().toLocaleDateString('ko-KR');
            const isToday = date === today;
            return `<tr>
                <td style="font-weight:${isToday?'700':'400'};color:${isToday?'var(--main)':'inherit'};">
                    ${date}${isToday ? ' <span style="font-size:10px;background:var(--main);color:white;padding:2px 6px;border-radius:4px;">오늘</span>' : ''}
                </td>
                <td><span class="today-badge">+${sales}</span></td>
                <td style="color:#94A3B8;font-size:12px;">${count}회</td>
            </tr>`;
        }).join('');
    }

    /* ── 탭 전환 ── */
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabToday').className = 'chart-tab' + (tab==='today' ? ' active' : '');
        document.getElementById('tabAll').className   = 'chart-tab' + (tab==='all'   ? ' active' : '');
        renderChart(currentLogs, tab);
    }

    /* ── 차트 ── */
    function renderChart(logs, tab) {
        if (mainChart) { mainChart.destroy(); mainChart = null; }
        const ctx = document.getElementById('detailChart').getContext('2d');

        let chartLogs;
        if (tab === 'today') {
            const before = logs.filter(l => l.collected_at < getTodayStartUTC());
            const after  = logs.filter(l => l.collected_at >= getTodayStartUTC());
            chartLogs = [...before.slice(-1), ...after];
        } else {
            chartLogs = logs;
        }

        if (chartLogs.length < 2) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = '14px Arial'; ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'center';
            ctx.fillText(tab==='today' ? '오늘 수집된 데이터가 부족합니다.' : '수집 데이터가 부족합니다.',
                ctx.canvas.width/2, ctx.canvas.height/2);
            return;
        }

        const labels = [tab==='today' ? '00:00 기준' : formatTime(chartLogs[0].collected_at)];
        const data = [0];
        let cum = 0;
        for (let i = 1; i < chartLogs.length; i++) {
            const diff = chartLogs[i-1].stock - chartLogs[i].stock;
            if (diff > 0) cum += diff;
            labels.push(formatTime(chartLogs[i].collected_at));
            data.push(cum);
        }

        const color   = tab==='today' ? '#15803D' : '#0047AB';
        const bgColor = tab==='today' ? 'rgba(21,128,61,0.08)' : 'rgba(0,71,171,0.08)';

        mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{
                data, borderColor: color, backgroundColor: bgColor,
                fill: true, tension: 0.3, borderWidth: 3,
                pointBackgroundColor: color, pointRadius: 5, pointHoverRadius: 7
            }]},
            options: {
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: c => (tab==='today'?'오늘 판매: ':'누적 판매: ')+'+'+c.parsed.y+'개' }}
                },
                scales: {
                    x: { ticks: { font: { size: 10 }, maxRotation: 45 }},
                    y: { min: 0, ticks: { stepSize: 1 },
                         title: { display: true, text: tab==='today'?'오늘 판매량':'누적 판매량', font:{size:11}, color:'#94A3B8' }}
                }
            }
        });
    }

    function formatTime(isoStr) {
        const d = new Date(isoStr);
        return (d.getMonth()+1)+'/'+d.getDate()+' '+
               String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    }

    /* ── 사이드바 ── */
    function refreshSidebar() {
        document.getElementById('productList').innerHTML = allProducts.map(p => {
            const active = currentProduct && currentProduct.id === p.id ? ' active' : '';
            return `<div class="product-item${active}" onclick="showDetail(${p.id})" title="${escH(p.name)}">
                ${escH(p.name.length > 16 ? p.name.substring(0,16)+'...' : p.name)}
            </div>`;
        }).join('');
    }

    function showSummary() {
        currentProduct = null;
        document.getElementById('summaryView').style.display = 'block';
        document.getElementById('detailView').style.display = 'none';
        refreshSidebar();
        loadSummary();
    }

    /* ── 상품 관리 모달 ── */
    async function openModal() {
        document.getElementById('manageModal').className = 'modal-bg show';
        await loadManageList();
    }

    function closeModal() {
        document.getElementById('manageModal').className = 'modal-bg';
    }

    async function loadManageList() {
        const list = await sbGet('products?active=eq.true&select=id,name,url,has_paid_options&order=name.asc');
        document.getElementById('productManageList').innerHTML = list.length
            ? list.map(p => `
                <div class="product-row">
                    <span class="pname">${escH(p.name)}</span>
                    <span class="purl">${escH(p.url)}</span>
                    <button class="option-toggle ${p.has_paid_options ? 'on' : ''}" 
                        onclick="togglePaidOptions(${p.id}, ${p.has_paid_options})"
                        title="유료옵션있음 (다른 추적값 발동)">
                        💰${p.has_paid_options ? 'ON' : 'OFF'}
                    </button>
                    <button class="del-btn" onclick="deleteProduct(${p.id})">삭제</button>
                </div>`).join('')
            : '<div style="color:#94A3B8;font-size:13px;padding:16px 0;">등록된 상품이 없습니다.</div>';
    }

    async function togglePaidOptions(id, current) {
        try {
            const newVal = !JSON.parse(current); // 문자열 "false"/"true" 안전하게 변환
            await sbPatch(`products?id=eq.${id}`, { has_paid_options: newVal });
            await loadManageList();
            allProducts = await sbGet('products?active=eq.true&select=id,name,url,has_paid_options&order=name.asc');
            loadSummary();
        } catch(e) {
            alert('❌ 업데이트 실패: ' + e.message);
        }
    }

    /* ── URL 입력 시 상품명 자동완성 ── */
    let urlFetchTimer = null;
    function onUrlInput(val) {
        clearTimeout(urlFetchTimer);
        const status = document.getElementById('fetchStatus');
        if (!val.includes('naver.com')) { status.innerText = ''; return; }
        status.innerText = '⏳ 조회중...';
        urlFetchTimer = setTimeout(() => fetchProductName(val), 800);
    }

    async function fetchProductName(url) {
        const status = document.getElementById('fetchStatus');
        const nameEl = document.getElementById('addName');
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);
            const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url);
            const res = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeout);
            const html = await res.text();

            // og:title 먼저 시도
            let name = '';
            const ogMatch = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
                         || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i);
            if (ogMatch) {
                name = ogMatch[1].trim();
            } else {
                // title 태그 폴백
                const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
                if (titleMatch) name = titleMatch[1].replace(/[:|네이버쇼핑]/g, '').trim();
            }

            if (name && !nameEl.value) {
                nameEl.value = name;
                status.innerText = '✅ 자동완성';
                status.style.color = '#15803D';
            } else if (!name) {
                status.innerText = '직접 입력';
                status.style.color = '#94A3B8';
            } else {
                status.innerText = '✅';
                status.style.color = '#15803D';
            }
        } catch(e) {
            status.innerText = '직접 입력';
            status.style.color = '#94A3B8';
        }
    }

    async function addProduct() {
        const name = document.getElementById('addName').value.trim();
        const url  = document.getElementById('addUrl').value.trim();
        if (!name || !url) { alert('상품명과 URL을 모두 입력해주세요.'); return; }
        if (!url.includes('naver.com')) { alert('네이버 상품 URL을 입력해주세요.'); return; }

        try {
            await sbPost('products', { name, url, active: true });
            document.getElementById('addName').value = '';
            document.getElementById('addUrl').value  = '';
            await loadManageList();
            allProducts = await sbGet('products?active=eq.true&select=id,name,url,has_paid_options&order=name.asc');
            refreshSidebar();

            // 방금 추가된 상품 ID 조회 (URL로 찾기)
            const found = await sbGet('products?url=eq.' + encodeURIComponent(url) + '&select=id&order=id.desc&limit=1');
            const newId = found && found[0] ? found[0].id : null;
            console.log('새 상품 ID:', newId);

            // 상품 추가 후 해당 상품만 크롤링 트리거
            const ok = newId ? await triggerCrawl(newId) : false;
            if (ok) {
                alert('✅ 추가됐습니다!\n지금 바로 수집을 시작했어요. 1~2분 후 대시보드를 새로고침해주세요.');
            } else {
                alert('✅ 추가됐습니다!\n다음 자동 수집(00시/23시59분)부터 데이터가 쌓입니다.');
            }
        } catch(e) {
            alert('❌ 추가 실패: ' + e.message);
        }
    }

    async function deleteProduct(id) {
        if (!confirm('이 상품을 삭제할까요?\n수집된 데이터도 함께 삭제됩니다.')) return;
        try {
            await sbDelete(`stock_logs?product_id=eq.${id}`);
            await sbDelete(`products?id=eq.${id}`);
            await loadManageList();
            allProducts = await sbGet('products?active=eq.true&select=id,name,url,has_paid_options&order=name.asc');
            refreshSidebar();
        } catch(e) {
            alert('❌ 삭제 실패: ' + e.message);
        }
    }

    document.getElementById('manageModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    /* ── 유틸 ── */
    function escH(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
