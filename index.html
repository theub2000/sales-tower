<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sales Tower | 스마트스토어 실시간 관제탑</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main: #0047AB; --bg: #F0F4F8; --dark: #001A33; --gold: #F59E0B; --green: #22C55E; }
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; color: #1E293B; }

        .sidebar { width: 260px; background: var(--dark); color: white; height: 100vh; padding: 32px 16px; position: fixed; overflow-y: auto; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; margin-bottom: 24px; color: #fff; cursor: pointer; }
        .product-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-size: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.2s; }
        .product-item:hover { background: rgba(255,255,255,0.08); }
        .product-item.active { background: var(--main); border-color: rgba(255,255,255,0.3); font-weight: 700; }
        .reset-btn { margin-top: 24px; background: none; border: 1px solid rgba(255,255,255,0.1); color: #475569; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 11px; }
        .reset-btn:hover { color: #94A3B8; }

        .main { margin-left: 260px; padding: 48px; width: calc(100% - 260px); }
        .card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,26,51,0.06); margin-bottom: 24px; border: 1px solid #E2E8F0; }
        .briefing-card { background: linear-gradient(135deg, #001A33, #0047AB); color: white; padding: 40px; border-radius: 24px; margin-bottom: 28px; }
        .tag { background: var(--gold); color: #000; padding: 4px 14px; border-radius: 50px; font-weight: 800; font-size: 11px; margin-bottom: 16px; display: inline-block; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; color: #94A3B8; font-size: 11px; border-bottom: 2px solid #F1F5F9; font-weight: 600; }
        td { padding: 18px 16px; border-bottom: 1px solid #F8FAFC; font-size: 14px; vertical-align: middle; }
        tr:hover td { background: #F8FAFC; }
        .sales-badge { background: #E0F2FE; color: #0369A1; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; }

        .install-card { background: #FFFBEB; border: 2px dashed #F59E0B; padding: 32px; border-radius: 24px; text-align: center; }
        .btn-install { background: var(--main); color: white; padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px; display: inline-block; cursor: grab; user-select: none; }

        .detail-header { padding: 36px; border-bottom: 1px solid #F1F5F9; }
        .detail-body { display: flex; padding: 40px; gap: 24px; flex-wrap: wrap; }
        .detail-metric { flex: 1; min-width: 180px; background: var(--main); color: white; padding: 40px 24px; border-radius: 20px; text-align: center; }
        .detail-metric .label { opacity: 0.8; font-size: 13px; margin-bottom: 12px; }
        .detail-metric .value { font-size: 64px; font-weight: 900; line-height: 1; }
        .detail-metric .sub { font-size: 11px; opacity: 0.6; margin-top: 12px; line-height: 1.8; }
        .detail-chart { flex: 2; min-width: 280px; background: white; padding: 28px; border-radius: 20px; border: 1px solid #E2E8F0; }

        .empty { text-align: center; padding: 48px; color: #94A3B8; font-size: 14px; line-height: 2; }
        .del-btn { background: none; border: 1px solid #E2E8F0; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; color: #94A3B8; }
        .del-btn:hover { border-color: #EF4444; color: #EF4444; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; }
        .back-btn { background: none; border: none; color: var(--main); cursor: pointer; font-weight: 700; font-size: 14px; margin-bottom: 20px; padding: 0; }
        .rank-1 { color: #F59E0B; } .rank-2 { color: #94A3B8; } .rank-3 { color: #CD7C2F; }
    </style>
</head>
<body onload="initMaster()">

<div class="sidebar">
    <div class="logo" onclick="showSummary()">SALES TOWER</div>
    <div id="productList"></div>
    <button class="reset-btn" onclick="if(confirm('모든 데이터를 초기화할까요?')){localStorage.clear();location.reload();}">System Reset</button>
</div>

<div class="main">
    <div id="summaryView">
        <div class="briefing-card">
            <div class="tag">📡 Sales Tower v1.7</div>
            <h1 style="margin:0 0 10px;font-size:30px;">경쟁사 판매 관제탑</h1>
            <p style="opacity:0.7;font-size:15px;margin:0;">북마크릿으로 수집한 데이터를 기반으로 판매 흐름을 분석합니다.</p>
        </div>
        <div class="card">
            <h3 style="margin:0 0 20px;font-size:16px;">📊 경쟁사 판매 순위</h3>
            <table>
                <thead>
                    <tr>
                        <th>순위</th><th>상품명</th><th>추적 시작일</th><th>누적 판매량</th><th>상태</th><th></th>
                    </tr>
                </thead>
                <tbody id="rankingTable"></tbody>
            </table>
        </div>
        <div class="install-card">
            <p style="margin:0 0 6px;font-size:14px;color:#92400E;font-weight:700;">👇 아래 버튼을 북마크 바로 드래그해서 설치 (클릭 X)</p>
            <p style="margin:0 0 20px;font-size:12px;color:#B45309;">설치 후 → 경쟁사 상품 상세페이지 이동 → 북마크릿 클릭</p>
            <a id="bookmarkletBtn" class="btn-install" href="#">🚀 세일즈 타워 정찰기 v1.7</a>
        </div>
    </div>

    <div id="detailView" style="display:none;">
        <button class="back-btn" onclick="showSummary()">← 전체 순위로</button>
        <div class="card" style="padding:0;overflow:hidden;border-radius:24px;">
            <div class="detail-header">
                <h2 id="detailName" style="margin:0;font-size:20px;word-break:keep-all;"></h2>
            </div>
            <div class="detail-body">
                <div class="detail-metric">
                    <div class="label">누적 판매량 추정</div>
                    <div class="value" id="detailSales">+0</div>
                    <div class="sub" id="detailSync">-</div>
                </div>
                <div class="detail-chart">
                    <canvas id="detailChart" height="120"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var currentProduct = "";
    var mainChart = null;

    function initMaster() {
        buildBookmarklet();

        var params = new URLSearchParams(window.location.search);
        var rawName = params.get('n');
        var rawStock = params.get('s');

        if (rawName && rawStock !== null) {
            var name = decodeURIComponent(rawName).trim();
            var stock = parseInt(rawStock) || 0;

            if (isValidName(name)) {
                saveLog(name, stock);
                currentProduct = name;
                showDetail(name);
            } else {
                showSummary();
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            showSummary();
        }

        refreshSidebar();
        startClock();
    }

    function buildBookmarklet() {
        var myUrl = window.location.origin + window.location.pathname;

        var code = 'javascript:(function(){' +
            'if(!location.hostname.includes("naver.com")){' +
                'alert("⚠️ 네이버 경쟁사 상품 페이지에서 눌러주세요!");return;' +
            '}' +
            'var name="",stock=-1;' +
            'try{' +
                'var st=window.__PRELOADED_STATE__;' +
                'if(st&&st.simpleProductForDetailPage&&st.simpleProductForDetailPage.A){' +
                    'var p=st.simpleProductForDetailPage.A;' +
                    'name=(p.name||p.dispName||"").trim();' +
                    'if(typeof p.stockQuantity!=="undefined")stock=p.stockQuantity;' +
                '}' +
            '}catch(e){}' +
            'if(!name){' +
                'var el=document.querySelector("h3.v4Wy1b")||document.querySelector("._22uOOutput")||document.querySelector(".prd_name");' +
                'if(el)name=el.innerText.trim();' +
            '}' +
            'var blocked=["sales tower","스마트스토어","naver","네이버"];' +
            'var lower=name.toLowerCase();' +
            'var bad=blocked.some(function(b){return lower.includes(b);});' +
            'if(!name||name.length<2||bad){' +
                'alert("❌ 상품 정보를 읽지 못했습니다.\\n페이지가 완전히 로딩된 후 다시 시도해주세요.");return;' +
            '}' +
            'if(stock<0){' +
                'alert("❌ 데이터를 읽지 못했습니다.\\n페이지가 완전히 로딩된 후 다시 시도해주세요.");return;' +
            '}' +
            'if(!confirm("✅ 수집 완료!\\\\n\\\\n상품: "+name.substring(0,25)+(name.length>25?"...":"")+\'\\\\n\\\\n전송 + 1시간마다 자동수집을 시작할까요?\'))return;' +
            'function sendData(){try{var st2=window.__PRELOADED_STATE__;var s2=-1;if(st2&&st2.simpleProductForDetailPage&&st2.simpleProductForDetailPage.A){var p2=st2.simpleProductForDetailPage.A;if(typeof p2.stockQuantity!=="undefined")s2=p2.stockQuantity;}if(s2<0)return;var u=\"' + myUrl + '?n=\"+encodeURIComponent(name)+"&s="+s2+"&t="+Date.now();var w=window.open(u,"ST_"+Date.now());if(!w){if(confirm("팝업이 차단됐습니다.\\\\n현재 탭에서 이동할까요?"))location.href=u;}}catch(e){}}' +
            'sendData();' +
            'if(window.__stTimer)clearInterval(window.__stTimer);' +
            'window.__stTimer=setInterval(sendData,3600000);' +
        '})();';

        document.getElementById('bookmarkletBtn').href = code;
    }

    function saveLog(name, stock) {
        var key = 'st_' + name;
        var logs = JSON.parse(localStorage.getItem(key) || '[]');
        logs.push({ t: Date.now(), s: stock });
        if (logs.length > 500) logs = logs.slice(-500);
        localStorage.setItem(key, JSON.stringify(logs));

        var list = JSON.parse(localStorage.getItem('st_list') || '[]');
        if (!list.includes(name)) list.push(name);
        localStorage.setItem('st_list', JSON.stringify(list));
    }

    function getLogs(name) {
        return JSON.parse(localStorage.getItem('st_' + name) || '[]');
    }

    function calcSales(logs) {
        var total = 0;
        for (var i = 1; i < logs.length; i++) {
            var diff = logs[i-1].s - logs[i].s;
            if (diff > 0) total += diff;
        }
        return total;
    }

    function showSummary() {
        currentProduct = "";
        document.getElementById('summaryView').style.display = 'block';
        document.getElementById('detailView').style.display = 'none';
        refreshSidebar();

        var list = JSON.parse(localStorage.getItem('st_list') || '[]');
        var tbody = document.getElementById('rankingTable');

        if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="6"><div class="empty">아직 추적 중인 상품이 없습니다.<br>북마크릿을 설치하고 경쟁사 상품 페이지에서 클릭해주세요.</div></td></tr>';
            return;
        }

        var data = list.map(function(name) {
            var logs = getLogs(name);
            return { name: name, sales: calcSales(logs), count: logs.length, start: logs.length ? logs[0].t : 0 };
        }).sort(function(a, b) { return b.sales - a.sales; });

        tbody.innerHTML = data.map(function(item, i) {
            var rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
            return '<tr onclick="showDetail(\'' + escQ(item.name) + '\')" style="cursor:pointer">' +
                '<td class="' + rc + '" style="font-weight:800;">#' + (i+1) + '</td>' +
                '<td style="font-weight:600;max-width:320px;word-break:keep-all;">' + escH(item.name) + '</td>' +
                '<td style="color:#94A3B8;font-size:12px;">' + new Date(item.start).toLocaleDateString() + '</td>' +
                '<td><span class="sales-badge">+' + item.sales + '</span></td>' +
                '<td><span class="dot"></span>' + item.count + '회 수집</td>' +
                '<td><button class="del-btn" onclick="event.stopPropagation();deleteProduct(\'' + escQ(item.name) + '\')">삭제</button></td>' +
            '</tr>';
        }).join('');
    }

    function showDetail(name) {
        currentProduct = name;
        document.getElementById('summaryView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        refreshSidebar();

        var logs = getLogs(name);
        document.getElementById('detailName').innerText = name;
        document.getElementById('detailSales').innerText = '+' + calcSales(logs);
        renderChart(logs);
    }

    function renderChart(logs) {
        if (mainChart) mainChart.destroy();

        // 데이터 2개 미만이면 안내 메시지
        if (logs.length < 2) {
            var ctx = document.getElementById('detailChart').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.font = '14px Arial';
            ctx.fillStyle = '#94A3B8';
            ctx.textAlign = 'center';
            ctx.fillText('수집 횟수가 부족합니다. 한 번 더 수집해주세요.', ctx.canvas.width / 2, ctx.canvas.height / 2);
            mainChart = null;
            return;
        }

        // 수집 시각별 누적 판매량 계산
        var labels = [];
        var cumulativeData = [];
        var cumulative = 0;

        // 첫 번째 포인트는 기준점 (누적 0)
        labels.push(formatTime(logs[0].t));
        cumulativeData.push(0);

        for (var i = 1; i < logs.length; i++) {
            var diff = logs[i-1].s - logs[i].s;
            if (diff > 0) cumulative += diff;
            labels.push(formatTime(logs[i].t));
            cumulativeData.push(cumulative);
        }

        mainChart = new Chart(document.getElementById('detailChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '누적 판매량',
                    data: cumulativeData,
                    borderColor: '#0047AB',
                    backgroundColor: 'rgba(0,71,171,0.08)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3,
                    pointBackgroundColor: '#0047AB',
                    pointRadius: 5,
                    pointHoverRadius: 7
                }]
            },
            options: {
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) { return '누적 판매: +' + ctx.parsed.y + '개'; }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { font: { size: 11 }, maxRotation: 45 }
                    },
                    y: {
                        min: 0,
                        ticks: { stepSize: 1 },
                        title: { display: true, text: '누적 판매량', font: { size: 11 }, color: '#94A3B8' }
                    }
                }
            }
        });
    }

    function formatTime(ts) {
        var d = new Date(ts);
        var month = d.getMonth() + 1;
        var day = d.getDate();
        var h = String(d.getHours()).padStart(2, '0');
        var m = String(d.getMinutes()).padStart(2, '0');
        return (month) + '/' + day + ' ' + h + ':' + m;
    }

    function startClock() {
        setInterval(function() {
            if (!currentProduct) return;
            var el = document.getElementById('detailSync');
            if (!el) return;
            var logs = getLogs(currentProduct);
            var last = logs.length ? new Date(logs[logs.length-1].t).toLocaleTimeString() : '-';
            el.innerHTML = '마지막 수집: ' + last + '<br>현재: ' + new Date().toLocaleTimeString();
        }, 1000);
    }

    function refreshSidebar() {
        var list = JSON.parse(localStorage.getItem('st_list') || '[]');
        document.getElementById('productList').innerHTML = list.map(function(name) {
            var active = name === currentProduct ? ' active' : '';
            return '<div class="product-item' + active + '" onclick="showDetail(\'' + escQ(name) + '\')" title="' + escH(name) + '">' +
                escH(name.length > 16 ? name.substring(0,16) + '...' : name) +
            '</div>';
        }).join('');
    }

    function deleteProduct(name) {
        if (!confirm('"' + name + '"\n데이터를 삭제할까요?')) return;
        localStorage.removeItem('st_' + name);
        var list = JSON.parse(localStorage.getItem('st_list') || '[]');
        list = list.filter(function(n){ return n !== name; });
        localStorage.setItem('st_list', JSON.stringify(list));
        showSummary();
    }

    function isValidName(name) {
        var blocked = ['sales tower','스마트스토어','naver','네이버'];
        var lower = name.toLowerCase();
        return name.length >= 2 && !blocked.some(function(b){ return lower.includes(b); });
    }

    function escQ(str) { return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
    function escH(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
